# Agentic Trading OS - Docker Compose Configuration
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up trading         # Start trading only
#   docker-compose logs -f trading    # View logs
#   docker-compose down               # Stop all services

version: '3.8'

services:
  # ==========================================
  # Main Trading Service
  # ==========================================
  trading:
    build:
      context: .
      target: production
    container_name: agentic-trading
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TRADING_MODE=${TRADING_MODE:-paper}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - COINBASE_API_KEY=${COINBASE_API_KEY:-}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET:-}
      - COINBASE_PASSPHRASE=${COINBASE_PASSPHRASE:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=trading
      - DB_USERNAME=${DB_USERNAME:-trading}
      - DB_PASSWORD=${DB_PASSWORD:-trading123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./.credentials:/app/.credentials
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: agentic-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME:-trading}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-trading123}
      - POSTGRES_DB=trading
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trading}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Prometheus Metrics
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: agentic-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - trading-network
    profiles:
      - monitoring

  # ==========================================
  # Grafana Dashboard
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: agentic-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - trading-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ==========================================
  # Development Service
  # ==========================================
  dev:
    build:
      context: .
      target: development
    container_name: agentic-dev
    volumes:
      - .:/app
      - /app/venv
    ports:
      - "8081:8080"
    environment:
      - TRADING_MODE=paper
      - LOG_LEVEL=DEBUG
    networks:
      - trading-network
    profiles:
      - dev
    command: ["python", "Alpha IO/trading_system.py", "--mode", "all-tests"]

# ==========================================
# Networks
# ==========================================
networks:
  trading-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
